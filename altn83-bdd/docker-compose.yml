services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: nanoorbit-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: Oracle2025
      APP_USER: NANOORBIT_ADMIN
      APP_USER_PASSWORD: NanoOrbit2025
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./livrables:/opt/oracle/livrables
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

volumes:
  oracle-data:
